openapi: 3.0.4
info:
  title: Chainlink Verifiable Network API
  version: 0.1.0

paths:
  /health-check:
    get:
      summary: Health check endpoint
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthCheck"

  /events:
    post:
      summary: Creates a new event.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatcherDetectedEvent"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                type: object
                properties:
                  event_id:
                    type: string
                    format: uuid
                    description: Unique identifier for the created event
                required:
                  - event_id

  /accounts:
    post:
      summary: Creates a new account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccount"
      responses:
        "201":
          description: Account created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
    get:
      summary: Retrieves accounts for the organization.
      parameters:
        - in: query
          name: name
          description: Filter accounts by name
          schema:
            type: string
        - in: query
          name: chain_id
          description: Filter accounts by chain ID
          schema:
            type: string
        - in: query
          name: limit
          description: Maximum number of accounts to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - in: query
          name: offset
          description: Number of accounts to skip for pagination
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountList"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
  /accounts/{account_id}:
    get:
      summary: Retrieves a specific account by ID.
      parameters:
        - in: path
          name: account_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Account found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "404":
          description: Account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
    patch:
      summary: Updates an account name.
      parameters:
        - in: path
          name: account_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccount"
      responses:
        "200":
          description: Account updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "404":
          description: Account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"

  /channels:
    post:
      summary: Creates a new channel.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChannel"
      responses:
        "201":
          description: Channel created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
        "400":
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
    get:
      summary: Retrieves channels for the organization.
      parameters:
        - in: query
          name: limit
          description: Maximum number of channels to return
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - in: query
          name: offset
          description: Number of channels to skip for pagination
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelList"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
  /channels/{channel_id}:
    get:
      summary: Retrieves a specific channel by ID.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Channel found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
    delete:
      summary: Deletes a channel.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "202":
          description: Delete request accepted.
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"

  /channels/{channel_id}/watchers:
    post:
      summary: Creates a watcher in a channel.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWatcher"
      responses:
        "201":
          description: Watcher created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Watcher"
        "400":
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
    get:
      summary: Retrieves watchers for a channel.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: limit
          description: Maximum number of watchers to return
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - in: query
          name: offset
          description: Number of watchers to skip for pagination
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: chain_family
          description: Filter watchers by blockchain family
          schema:
            type: string
        - in: query
          name: chain_id
          description: Filter watchers by chain ID
          schema:
            type: string
        - in: query
          name: address
          description: Filter watchers by contract address
          schema:
            type: string
        - in: query
          name: event_name
          description: Filter watchers by event name
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatcherList"
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
  /channels/{channel_id}/watchers/{watcher_id}:
    get:
      summary: Retrieves a specific watcher by ID.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: watcher_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Watcher found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Watcher"
        "404":
          description: Channel or watcher not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
    delete:
      summary: Deletes a watcher.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: watcher_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "202":
          description: Delete request accepted.
        "404":
          description: Channel or watcher not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"

  /channels/{channel_id}/operations:
    post:
      summary: Sends a CreateOperation request to a channel.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOperation"
      responses:
        "201":
          description: Operation created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationResponse"
        "400":
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
  /channels/{channel_id}/operations/{operation_id}:
    get:
      summary: Gets Operation record for a specific operation.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: operation_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Operation found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
        "404":
          description: Channel or operation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
  /channels/{channel_id}/events:
    get:
      summary: Retrieves events from a channel.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: limit
          description: Maximum number of events to return
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - in: query
          name: offset
          description: Offset for message-oriented pagination
          schema:
            type: string
        - in: query
          name: type
          description: Filter events by type
          schema:
            type: string
            enum:
              - operation.status
              - watcher.status
              - watcher.event
      responses:
        "200":
          description: Events retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
        "400":
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"

security:
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Api-Key
      description: Public organisation API key.
  schemas:
    HealthCheck:
      type: object
      properties:
        status:
          type: string
          example: "ok"
      required:
        - status
    CreateAccount:
      type: object
      properties:
        name:
          type: string
          description: Name of the account
        address:
          type: string
          description: EVM account address (42-character hex string starting with 0x)
          pattern: "^0x[a-fA-F0-9]{40}$"
        chain_id:
          type: string
          description: The id that identifies the chain where the account exists
      required:
        - address
        - chain_id
    UpdateAccount:
      type: object
      properties:
        name:
          type: string
          description: New name for the account
      required:
        - name
    Account:
      type: object
      properties:
        account_id:
          type: string
          format: uuid
          description: Unique identifier for the account
        name:
          type: string
          description: Name of the account
        address:
          type: string
          description: EVM account address
        chain_id:
          type: string
          description: The id that identifies the chain where the account exists
      required:
        - account_id
        - address
        - chain_id
    AccountList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Account"
        has_more:
          type: boolean
          description: True if there are more accounts to fetch
      required:
        - data
        - has_more

    WatcherDetectedEvent:
      type: object
      properties:
        event_id:
          type: string
          format: uuid
          description: Unique identifier for the event
        created_at:
          type: integer
          format: int64
          description: Timestamp of when the event was created
        watcher_id:
          type: string
          format: uuid
          description: Watcher UUID that detected the event
        domain:
          type: string
          description: Domain namespace for the event
        name:
          type: string
          description: Name of the event
        chain_id:
          type: string
          description: The id that identifies the chain where the event happened
        address:
          type: string
          description: The address of the smart contract from which the event was emitted
        ocr_report:
          type: string
          description: OCR report for the event
        ocr_context:
          type: string
          description: OCR context for the event
        verifiable_event:
          type: string
          description: Base64 encoded verifiable event
        signatures:
          type: array
          items:
            type: string
            description: Signature of the event
        event_hash:
          type: string
          description: Deterministic event hash - keccak256(domain.name.base64payload)
      required:
        - event_id
        - created_at
        - watcher_id
        - domain
        - name
        - chain_id
        - address
        - ocr_report
        - ocr_context
        - verifiable_event
        - signatures
        - event_hash

    UpdateOperationStatus:
      type: object
      properties:
        account_operation_id:
          type: string
          description: Unique account operation identifier
        account_address:
          type: string
          description: Onchain account address performing the operation
        chain_id:
          type: string
          description: The id that identifies the chain where the account performing the operation lives
        transaction_hash:
          type: string
          description: Onchain transaction hash which included the operation
        transaction_timestamp:
          type: integer
          description: Timestamp of onchain transaction which included the operation
      required:
        - account_operation_id
        - account_address
        - chain_id
        - transaction_hash
        - transaction_timestamp
    TransactionRequest:
      type: object
      properties:
        to:
          type: string
          description: Address receiving the transaction
        value:
          type: string
          description: Amount of native token value being sent in the transaction
        data:
          type: string
          description: Hex-encoded calldata for the transaction
      required:
        - to
        - value
        - data
    Transaction:
      type: object
      properties:
        to:
          type: string
          description: Address receiving the transaction
        value:
          type: string
          description: Amount of native token value being sent in the transaction
        data:
          type: string
          description: Hex-encoded calldata for the transaction
      required:
        - to
        - value
        - data
    ApplicationError:
      type: object
      properties:
        type:
          type: string
          description: Error type
          enum:
            - "Already exists"
            - "Internal error"
            - "Not found"
            - "Bad request"
        message:
          type: string
          description: Error message describing the issue
      required:
        - type
        - message
    CreateChannel:
      type: object
      properties:
        name:
          type: string
          description: Name of the channel
      required:
        - name
    Channel:
      type: object
      properties:
        channel_id:
          type: string
          format: uuid
          description: Unique identifier for the channel
        name:
          type: string
          description: Name of the channel
        created_at:
          type: integer
          format: int64
          description: Timestamp of when the channel was created
        tenant_id:
          type: string
          description: Identifier of the tenant that owns this channel
      required:
        - channel_id
        - name
        - created_at
        - tenant_id
    ChannelList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Channel"
        has_more:
          type: boolean
          description: True if there are more channels to fetch
      required:
        - data
        - has_more
    CreateWatcher:
      oneOf:
        - $ref: "#/components/schemas/CreateWatcherWithDomain"
        - $ref: "#/components/schemas/CreateWatcherWithABI"
      discriminator:
        propertyName: domain
        mapping:
          domain_present: "#/components/schemas/CreateWatcherWithDomain"
          domain_absent: "#/components/schemas/CreateWatcherWithABI"
    CreateWatcherWithDomain:
      type: object
      properties:
        chain_family:
          type: string
          description: The blockchain family
          default: "evm"
        chain_id:
          type: string
          description: The ID that identifies the chain where the watcher will run
        address:
          type: string
          description: Smart contract address to watch for events
        domain:
          type: string
          description: Service domain namespace (e.g., "dvp", "dta")
        events:
          type: array
          items:
            type: string
          description: List of event names to watch for within the domain
          minItems: 1
      required:
        - chain_id
        - address
        - domain
        - events
    CreateWatcherWithABI:
      type: object
      properties:
        chain_family:
          type: string
          description: The blockchain family
          default: "evm"
        chain_id:
          type: string
          description: The ID that identifies the chain where the watcher will run
        address:
          type: string
          description: Smart contract address to watch for events
        events:
          type: array
          items:
            type: string
          description: List of event names to watch for
          minItems: 1
        abi:
          type: array
          items:
            $ref: "#/components/schemas/EventABI"
          description: ABI definitions for the events to watch
          minItems: 1
      required:
        - chain_id
        - address
        - events
        - abi
    EventABI:
      type: object
      properties:
        anonymous:
          type: boolean
          description: Whether the event is anonymous
        inputs:
          type: array
          items:
            $ref: "#/components/schemas/EventABIInput"
          description: Event input parameters
        name:
          type: string
          description: Name of the event
        type:
          type: string
          enum: ["event"]
          description: Type must be 'event'
      required:
        - anonymous
        - inputs
        - name
        - type
    EventABIInput:
      type: object
      properties:
        indexed:
          type: boolean
          description: Whether the parameter is indexed
        internalType:
          type: string
          description: Internal Solidity type
        name:
          type: string
          description: Parameter name
        type:
          type: string
          description: Parameter type
      required:
        - indexed
        - internalType
        - name
        - type
    Watcher:
      type: object
      properties:
        watcher_id:
          type: string
          format: uuid
          description: Unique identifier for the watcher
        channel_id:
          type: string
          format: uuid
          description: ID of the channel this watcher belongs to
        created_at:
          type: integer
          format: int64
          description: Timestamp of when the watcher was created
        status:
          type: string
          description: Current status of the watcher
        chain_family:
          type: string
          description: The blockchain family
        chain_id:
          type: string
          description: The ID that identifies the chain where the watcher runs
        address:
          type: string
          description: Smart contract address being watched
        domain:
          type: string
          description: Service domain namespace (if using domain-based events)
        events:
          type: array
          items:
            type: string
          description: List of event names being watched
        abi:
          type: array
          items:
            $ref: "#/components/schemas/EventABI"
          description: ABI definitions for the events (if not using domain-based events)
      required:
        - watcher_id
        - channel_id
        - created_at
        - status
        - chain_family
        - chain_id
        - address
        - events
    WatcherList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Watcher"
        has_more:
          type: boolean
          description: True if there are more watchers to fetch
      required:
        - data
        - has_more
    CreateOperation:
      type: object
      properties:
        chain_family:
          type: string
          description: The blockchain family
          default: "evm"
        chain_id:
          type: string
          description: The ID that identifies the chain where the operation will be executed
        address:
          type: string
          description: Account address performing the operation
        wallet_operation_id:
          type: string
          description: Unique wallet operation identifier
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/TransactionRequest"
          description: List of transactions to execute
          minItems: 1
        signature:
          type: string
          description: EIP-712 signature of the operation
      required:
        - chain_id
        - address
        - wallet_operation_id
        - transactions
        - signature
    Operation:
      type: object
      properties:
        operation_id:
          type: string
          format: uuid
          description: Unique identifier for the operation
        status:
          type: string
          description: Current status of the operation
        chain_family:
          type: string
          description: The blockchain family
        chain_id:
          type: string
          description: The ID that identifies the chain where the operation is executed
        address:
          type: string
          description: Account address performing the operation
        wallet_operation_id:
          type: string
          description: Unique wallet operation identifier
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/TransactionRequest"
          description: List of transactions to execute
        signature:
          type: string
          description: EIP-712 signature of the operation
        created_at:
          type: integer
          format: int64
          description: Timestamp of when the operation was created
      required:
        - operation_id
        - status
        - chain_family
        - chain_id
        - address
        - wallet_operation_id
        - transactions
        - signature
        - created_at
    OperationResponse:
      type: object
      properties:
        operation_id:
          type: string
          format: uuid
          description: Unique identifier for the operation
      required:
        - operation_id
    Event:
      type: object
      properties:
        payload:
          oneOf:
            - $ref: "#/components/schemas/OperationStatusPayload"
            - $ref: "#/components/schemas/WatcherStatusPayload"
            - $ref: "#/components/schemas/WatcherEventPayload"
          discriminator:
            propertyName: type
        headers:
          $ref: "#/components/schemas/EventHeaders"
      required:
        - payload
        - headers
    EventHeaders:
      type: object
      properties:
        offset:
          type: string
          description: Unique offset for message ordering
        proofs:
          type: array
          items:
            oneOf:
              - $ref: "#/components/schemas/OCRProof"
              - type: object
                description: Generic proof object for future extensibility
                additionalProperties: true
      required:
        - offset
        - proofs
    OCRProof:
      type: object
      properties:
        alg:
          type: string
          description: Algorithm used for the proof
        ocr_report:
          type: string
          description: OCR report data
        ocr_context:
          type: string
          description: OCR context data
        signatures:
          type: array
          items:
            type: string
          description: Array of signatures
      required:
        - alg
        - ocr_report
        - ocr_context
        - signatures
    OperationStatusPayload:
      type: object
      properties:
        type:
          type: string
          enum: [operation.status]
        status:
          type: string
          enum: [pending, sent, confirmed, failed]
          description: Current status of the operation
        status_reason:
          type: string
          description: Reason for the status
        chain_family:
          type: string
          description: Blockchain family (e.g., evm)
        chain_id:
          type: string
          description: Chain identifier
        address:
          type: string
          description: Account address
        account_operation_id:
          type: string
          description: Account operation identifier
        transaction:
          $ref: "#/components/schemas/EventTransaction"
      required:
        - type
        - status
        - status_reason
        - chain_family
        - chain_id
        - address
        - account_operation_id
    WatcherStatusPayload:
      type: object
      properties:
        type:
          type: string
          enum: [watcher.status]
        watcher_id:
          type: string
          description: Unique watcher identifier
        status:
          type: string
          enum: [pending, deploying, removed, failed, deleting, deleted]
          description: Current status of the watcher
        status_code:
          type: string
          description: Status code
        status_reason:
          type: string
          description: Reason for the status
        chain_family:
          type: string
          description: Blockchain family (e.g., evm)
        chain_id:
          type: string
          description: Chain identifier
      required:
        - type
        - watcher_id
        - status
        - status_code
        - status_reason
        - chain_family
        - chain_id
    WatcherEventPayload:
      type: object
      properties:
        type:
          type: string
          enum: [watcher.event]
        watcher_id:
          type: string
          description: Unique watcher identifier
        chain_family:
          type: string
          description: Blockchain family (e.g., evm)
        chain_id:
          type: string
          description: Chain identifier
        address:
          type: string
          description: Contract address that emitted the event
        transaction:
          $ref: "#/components/schemas/EventTransaction"
        event:
          $ref: "#/components/schemas/WatcherEvent"
      required:
        - type
        - watcher_id
        - chain_family
        - chain_id
        - address
        - transaction
        - event
    EventTransaction:
      type: object
      properties:
        timestamp:
          type: integer
          format: int64
          description: Transaction timestamp
        hash:
          type: string
          description: Transaction hash
      required:
        - timestamp
        - hash
    WatcherEvent:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          description: Event timestamp
        domain:
          type: string
          description: Domain associated with the event (optional)
        event_name:
          type: string
          description: Name of the event
        topic_hash:
          type: string
          description: Event topic hash
        log_index:
          type: integer
          description: Log index in the transaction
        data:
          type: object
          additionalProperties: true
          description: Event data - can be any structure
        metadata:
          type: object
          additionalProperties: true
          description: Event metadata - can be any structure
      required:
        - timestamp
        - event_name
        - topic_hash
        - log_index
        - data
