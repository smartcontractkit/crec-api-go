extends: [[spectral:oas, recommended]]
rules:
  operation-operationId: true
  operation-tags: true
  oas3-api-servers: true
  oas3-schema: true
  oas3-unused-component: true
  oas3-parameter-description: true
  operation-description: true
  oas3-missing-example: true
  component-description: true
  oas3-valid-schema-example: error

  # snake_case JSON property names are the intentional wire format for this API;
  # renaming to camelCase would be a breaking change.
  camel-case-properties: false

  # Error response descriptions (e.g. "Not found", "Internal server error") repeat
  # across endpoints by design — they describe the same error type consistently.
  description-duplication: false
