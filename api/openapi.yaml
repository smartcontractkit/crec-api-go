openapi: 3.0.4
info:
  title: CRE Connect API
  version: 0.4.0
  description: API specification for CRE Connect resources

paths:
  /health-check:
    get:
      summary: Health check endpoint
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthCheck"

  /wallets:
    post:
      summary: Creates a new wallet.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWallet"
      responses:
        "201":
          description: Wallet created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"
        "400":
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
    get:
      summary: Retrieves wallets for the organization.
      parameters:
        - in: query
          name: name
          description: Filter wallets by name (case-insensitive partial match)
          schema:
            type: string
        - in: query
          name: chain_selector
          description: Filter wallets by chain selector
          schema:
            type: string
        - in: query
          name: owner
          description: Filter wallets by owner address
          schema:
            type: string
            pattern: "^0x[a-fA-F0-9]{40}$"
        - in: query
          name: address
          description: Filter wallets by wallet address
          schema:
            type: string
            pattern: "^0x[a-fA-F0-9]{40}$"
        - in: query
          name: type
          description: Filter wallets by type
          schema:
            $ref: "#/components/schemas/WalletType"
        - in: query
          name: status
          description: Filter wallets by status
          schema:
            $ref: "#/components/schemas/WalletStatus"
        - in: query
          name: limit
          description: Maximum number of wallets to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - in: query
          name: offset
          description: Number of wallets to skip for pagination
          schema:
            type: integer
            format: int64
            minimum: 0
            default: 0
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletList"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
  /wallets/{wallet_id}:
    get:
      summary: Retrieves a specific wallet by ID.
      parameters:
        - in: path
          name: wallet_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Wallet found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"
        "404":
          description: Wallet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
    patch:
      summary: Updates a wallet name.
      parameters:
        - in: path
          name: wallet_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWallet"
      responses:
        "200":
          description: Wallet updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"
        "400":
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "404":
          description: Wallet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
    delete:
      summary: Remove a wallet.
      parameters:
        - in: path
          name: wallet_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Wallet removed successfully.
        "404":
          description: Wallet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"

  /channels:
    post:
      summary: Creates a new channel.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChannel"
      responses:
        "201":
          description: Channel created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
        "400":
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
    get:
      summary: Retrieves channels for the organization.
      parameters:
        - in: query
          name: name
          description: Filter channels by name (case-insensitive partial match)
          schema:
            type: string
        - in: query
          name: limit
          description: Maximum number of channels to return
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - in: query
          name: offset
          description: Number of channels to skip for pagination
          schema:
            type: integer
            format: int64
            minimum: 0
            default: 0
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelList"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
  /channels/{channel_id}:
    get:
      summary: Retrieves a specific channel by ID.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Channel found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
    put:
      summary: Updates a channel.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChannel"
      responses:
        "200":
          description: Channel updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
        "400":
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
    delete:
      summary: Deletes a channel.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "202":
          description: Delete request accepted.
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"

  /channels/{channel_id}/watchers:
    post:
      summary: Creates a watcher in a channel.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWatcher"
      responses:
        "201":
          description: Watcher created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Watcher"
        "400":
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
    get:
      summary: Retrieves watchers for a channel.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: limit
          description: Maximum number of watchers to return
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - in: query
          name: offset
          description: Number of watchers to skip for pagination
          schema:
            type: integer
            format: int64
            minimum: 0
            default: 0
        - in: query
          name: name
          description: Filter watchers by name (case-insensitive partial match)
          schema:
            type: string
        - in: query
          name: status
          description: Filter watchers by status
          schema:
            $ref: "#/components/schemas/WatcherStatus"
        - in: query
          name: chain_selector
          description: Filter watchers by chain selector
          schema:
            type: string
        - in: query
          name: address
          description: Filter watchers by contract address
          schema:
            type: string
        - in: query
          name: domain
          description: Filter watchers by domain
          schema:
            type: string
        - in: query
          name: event_name
          description: Filter watchers by event name
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatcherList"
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
  /channels/{channel_id}/watchers/{watcher_id}:
    get:
      summary: Retrieves a specific watcher by ID.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: watcher_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Watcher found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Watcher"
        "404":
          description: Channel or watcher not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
    delete:
      summary: Deletes a watcher.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: watcher_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "202":
          description: Delete request accepted.
        "404":
          description: Channel or watcher not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
    patch:
      summary: Updates a watcher name.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: watcher_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWatcher"
      responses:
        "200":
          description: Watcher updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Watcher"
        "400":
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "404":
          description: Channel or watcher not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"

  /channels/{channel_id}/operations:
    post:
      summary: Sends a CreateOperation request to a channel.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOperation"
      responses:
        "201":
          description: Operation created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationResponse"
        "400":
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
    get:
      summary: Retrieves operations for a channel.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: limit
          description: Maximum number of operations to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: offset
          description: Number of operations to skip for pagination
          schema:
            type: integer
            format: int64
            minimum: 0
            default: 0
        - in: query
          name: status
          description: Filter operations by status
          schema:
            $ref: "#/components/schemas/OperationStatus"
        - in: query
          name: chain_selector
          description: Filter operations by chain selector
          schema:
            type: string
        - in: query
          name: address
          description: Filter operations by wallet address
          schema:
            type: string
        - in: query
          name: wallet_id
          description: Filter operations by wallet ID
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationList"
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
  /channels/{channel_id}/operations/{operation_id}:
    get:
      summary: Gets Operation record for a specific operation.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: operation_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Operation found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
        "404":
          description: Channel or operation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"

  /channels/{channel_id}/events:
    get:
      summary: Retrieves events from a channel.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: limit
          description: Maximum number of events to return
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 200
        - in: query
          name: offset
          description: Offset for message-oriented pagination. If not provided, the API returns the latest limit events ordered by descending offset.
          schema:
            type: integer
            format: int64
            minimum: 0
      responses:
        "200":
          description: Events retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventList"
        "400":
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"

  /channels/{channel_id}/events/search:
    get:
      summary: Query and search historical events from a channel.
      description: |
        Retrieves events with filtering capabilities. Use this endpoint for historical queries and searches. For real-time polling, use the /events endpoint.

        Note: Some query parameters only apply to specific event types. Invalid parameter combinations for a given event type will result in a 400 Bad Request response:
        - operation.status: status, chain_selector, address, wallet_operation_id
        - watcher.status: watcher_id, status, chain_selector
        - watcher.event: watcher_id, chain_selector, address, event_name, domain
        - wallet.status: wallet_id, status, chain_selector, address

        Universal parameters (apply to all types): type, limit, offset, created.*
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: limit
          description: Maximum number of events to return
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - in: query
          name: offset
          description: Offset for message-oriented pagination
          schema:
            type: integer
            format: int64
            minimum: 0
        - in: query
          name: type
          description: Filter events by type
          schema:
            $ref: "#/components/schemas/EventType"
        - in: query
          name: created.lt
          description: Filter events created before this timestamp
          schema:
            type: integer
            format: int64
        - in: query
          name: created.lte
          description: Filter events created at or before this timestamp
          schema:
            type: integer
            format: int64
        - in: query
          name: created.gt
          description: Filter events created after this timestamp
          schema:
            type: integer
            format: int64
        - in: query
          name: created.gte
          description: Filter events created at or after this timestamp
          schema:
            type: integer
            format: int64
        - in: query
          name: chain_selector
          description: Filter by chain selector (applies to operation.status, watcher.status, watcher.event, and wallet.status types)
          schema:
            type: string
        - in: query
          name: status
          description: Filter by operation status (applies to operation.status), watcher status (applies to watcher.status), or wallet status (applies to wallet.status)
          schema:
            type: string
        - in: query
          name: watcher_id
          description: Filter by watcher ID (applies to watcher.status and watcher.event types)
          schema:
            type: string
            format: uuid
        - in: query
          name: wallet_id
          description: Filter by wallet ID (applies to wallet.status type)
          schema:
            type: string
            format: uuid
        - in: query
          name: address
          description: Filter by wallet address (applies to operation.status and wallet.status types) or contract address (applies to watcher.event type)
          schema:
            type: string
        - in: query
          name: wallet_operation_id
          description: Filter by wallet operation ID (applies to operation.status type)
          schema:
            type: string
        - in: query
          name: operation_id
          description: Filter by operation ID (applies to operation.status type)
          schema:
            type: string
        - in: query
          name: event_name
          description: Filter by event name (applies to watcher.event type)
          schema:
            type: string
        - in: query
          name: domain
          description: Filter by watcher domain (applies to watcher.event type)
          schema:
            type: string
      responses:
        "200":
          description: Events retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventList"
        "400":
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"

  /channels/{channel_id}/events/search/{event_id}:
    get:
      summary: Retrieves a specific event by ID from a channel.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: event_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Event found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          description: Channel or event not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"

security:
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Api-Key
      description: Public organisation API key.
  schemas:
    WalletStatus:
      type: string
      description: Status of a wallet entity
      enum:
        - pending
        - deploying
        - deployed
        - failed
    WalletEventStatus:
      type: string
      description: Status of a wallet in events (includes deleted state for filtering)
      enum:
        - pending
        - deploying
        - deployed
        - failed
        - deleted
    WatcherStatus:
      type: string
      description: Status of a watcher entity
      enum:
        - pending
        - active
        - failed
    WatcherEventStatus:
      type: string
      description: Status of a watcher in events (includes transitional and deletion states for filtering)
      enum:
        - pending
        - active
        - failed
        - deleting
        - deletion_failed
        - deleted
    OperationStatus:
      type: string
      description: Status of an operation
      enum:
        - pending
        - sent
        - broadcasting
        - confirmed
        - failed
    WalletType:
      type: string
      description: Type of wallet
      enum:
        - ecdsa
        - rsa
    EventType:
      type: string
      description: Type of event
      enum:
        - operation.status
        - watcher.status
        - watcher.event
        - wallet.status
      # Custom varnames to avoid Go naming collision with OperationStatus, WatcherStatus, WalletStatus types
      x-enum-varnames:
        - EventTypeOperationStatus
        - EventTypeWatcherStatus
        - EventTypeWatcherEvent
        - EventTypeWalletStatus
    EthereumAddress:
      type: string
      description: 42-character hex Ethereum address
      pattern: "^0x[a-fA-F0-9]{40}$"
    RSAPublicKey:
      type: object
      description: RSA public key with exponent and modulus
      properties:
        e:
          type: string
          description: RSA public exponent (hex encoded, 2-17 bytes)
          ## For the public exponent (e), the common and recommended values
          ## result in an exact size of 3 or 4 bytes in encoded form.
          ## Max 17 bytes. in rare or custom implementations, it could be a
          ## large number up to the size of the modulus itself, i.e., hundreds
          ## of bytes (e.g., 256 bytes for a 2048-bit key). However, this is
          ## avoided in modern practice because it makes public key operations
          ## (encryption/signature verification) much slower without improving
          ## security
          ## bytes*2 for hex representation.
          pattern: "^0x[a-fA-F0-9]{2,34}$"
        n:
          type: string
          description: RSA modulus (hex encoded, min 2048 bits)
          ## 1024 bit keys are less secure. Only 2048 bit keys or 4096 bit RSA
          ## keys are supported. Modulus = (number_of_bits / 8) bytes =
          ## bytes*2 for hex representation.
          pattern: "^0x[a-fA-F0-9]{512,}$"
      required:
        - e
        - n
    RSASignersList:
      type: array
      description: List of allowed RSA public signing keys
      items:
        $ref: "#/components/schemas/RSAPublicKey"
      minItems: 0
      maxItems: 10
      uniqueItems: true
    ECDSASignersList:
      type: array
      description: List of allowed ECDSA public signing keys (Ethereum addresses)
      items:
        $ref: "#/components/schemas/EthereumAddress"
      minItems: 0
      maxItems: 10
      uniqueItems: true
