        - in: path
          name: operation_id
          required: true
          description: Unique operation identifier.
          schema:
            type: string
            format: uuid
      responses:
        "401":
          $ref: "#/components/responses/OrganizationNotFound"
        "200":
          description: Operation found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
              example: {operation_id: "c1e5b8d0-1234-5678-abcd-ef0123456789", status: "accepted", chain_selector: "16015286601757825753", address: "0x742d35Cc6634C0532925a3b844Bc454e4438f44e", wallet_operation_id: "42", deadline: 0, transactions: [], initiator: {subject_type: "api_key", subject_id: "key-123", subject_name: "my-key"}, signature: null, created_at: 1715698800, updated_at: 1715698800}
        "404":
          description: Channel or operation not found
