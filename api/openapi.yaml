openapi: 3.0.4
info:
  title: CRE Connect API
  version: 0.8.0
  description: API specification for CRE Connect resources.

servers:
  - url: https://cre-connect.api.chain.link/v1
    description: CRE Connect base URL.
  - url: http://localhost:8080
    description: Local development.

tags:
  - name: Health
    description: Service health.
  - name: Networks
    description: Supported networks.
  - name: Wallets
    description: Wallet lifecycle.
  - name: Channels
    description: Channels for watchers, events, and operations.
  - name: Watchers
    description: Watchers scoped to a channel.
  - name: Operations
    description: Operations within a channel.
  - name: Queries
    description: Chain queries scoped to a channel.
  - name: Events
    description: Events (poll and historical search).

paths:
  /health-check:
    get:
      tags:
        - Health
      operationId: getHealthCheck
      summary: Health check endpoint
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthCheck"

  /networks:
    get:
      tags:
        - Networks
      operationId: listNetworks
      summary: Retrieves available networks.
      responses:
        "401":
          $ref: "#/components/responses/OrganizationNotFound"
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkList"
              example: {data: [], has_more: false}
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              example: {type: "INTERNAL_ERROR", message: "An internal error occurred."}
  /wallets:
    post:
      tags:
        - Wallets
      operationId: createWallet
      summary: Creates a new wallet.
      requestBody:
        description: Wallet creation parameters.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWallet"
            example: {name: "my-wallet", wallet_owner_address: "0x742d35Cc6634C0532925a3b844Bc454e4438f44e", chain_selector: "16015286601757825753", configuration: {wallet_type: "ecdsa", allowed_signers: ["0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"]}}
      responses:
        "401":
          $ref: "#/components/responses/OrganizationNotFound"
        "201":
          description: Wallet created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"
              example: {wallet_id: "3fa85f64-5717-4562-b3fc-2c963f66afa6", name: "my-wallet", address: "0x742d35Cc6634C0532925a3b844Bc454e4438f44e", chain_selector: "16015286601757825753", wallet_type: "ecdsa", wallet_owner_address: "0x742d35Cc6634C0532925a3b844Bc454e4438f44e", status: "deployed", configuration: {wallet_type: "ecdsa", allowed_signers: ["0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"]}}
        "400":
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              example: {type: "VALIDATION_ERROR", message: "Invalid request data."}
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              example: {type: "INTERNAL_ERROR", message: "An internal error occurred."}
    get:
      tags:
        - Wallets
      operationId: listWallets
      summary: Retrieves wallets for the organization.
      description: |
        Returns wallets for the organization. Archived wallets are excluded by default.
        To include archived wallets, explicitly specify the archived status in the status filter.
      parameters:
        - in: query
          name: name
          description: Filter wallets by name (case-insensitive partial match)
          schema:
            type: string
        - in: query
          name: chain_selector
          description: Filter wallets by chain selector
          schema:
            type: string
        - in: query
          name: owner
          description: Filter wallets by owner address
          schema:
            $ref: "#/components/schemas/EthereumAddress"
        - in: query
          name: address
          description: Filter wallets by wallet address
          schema:
            $ref: "#/components/schemas/EthereumAddress"
        - in: query
          name: type
          description: Filter wallets by type
          schema:
            $ref: "#/components/schemas/WalletType"
        - in: query
          name: status
          description: Filter wallets by status. Multiple values allowed. Archived wallets are excluded by default when no status filter is specified.
          schema:
            type: array
            items:
              $ref: "#/components/schemas/WalletStatus"
          style: form
          explode: true
        - in: query
          name: limit
          description: Maximum number of wallets to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - in: query
          name: offset
          description: Number of wallets to skip for pagination
          schema:
            type: integer
            format: int64
            minimum: 0
            default: 0
      responses:
        "401":
          $ref: "#/components/responses/OrganizationNotFound"
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletList"
              example: {data: [], has_more: false}
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              example: {type: "INTERNAL_ERROR", message: "An internal error occurred."}
  /wallets/{wallet_id}:
    get:
      tags:
        - Wallets
      operationId: getWallet
      summary: Retrieves a specific wallet by ID.
      parameters:
        - in: path
          name: wallet_id
          required: true
          description: Unique wallet identifier.
          schema:
            type: string
            format: uuid
      responses:
        "401":
          $ref: "#/components/responses/OrganizationNotFound"
        "200":
          description: Wallet found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"
              example: {wallet_id: "3fa85f64-5717-4562-b3fc-2c963f66afa6", name: "my-wallet", address: "0x742d35Cc6634C0532925a3b844Bc454e4438f44e", chain_selector: "16015286601757825753", wallet_type: "ecdsa", wallet_owner_address: "0x742d35Cc6634C0532925a3b844Bc454e4438f44e", status: "deployed", configuration: {wallet_type: "ecdsa", allowed_signers: ["0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"]}}
        "404":
          description: Wallet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              example: {type: "NOT_FOUND", message: "The requested resource was not found."}
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              example: {type: "INTERNAL_ERROR", message: "An internal error occurred."}
    patch:
      tags:
        - Wallets
      operationId: updateWallet
      summary: Updates a wallet name.
      parameters:
        - in: path
          name: wallet_id
          required: true
          description: Unique wallet identifier.
          schema:
            type: string
            format: uuid
      requestBody:
        description: Wallet update parameters.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWallet"
            example: {name: "updated-wallet"}
      responses:
        "401":
          $ref: "#/components/responses/OrganizationNotFound"
        "200":
          description: Wallet updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"
              example: {wallet_id: "3fa85f64-5717-4562-b3fc-2c963f66afa6", name: "updated-wallet", address: "0x742d35Cc6634C0532925a3b844Bc454e4438f44e", chain_selector: "16015286601757825753", wallet_type: "ecdsa", wallet_owner_address: "0x742d35Cc6634C0532925a3b844Bc454e4438f44e", status: "deployed", configuration: {wallet_type: "ecdsa", allowed_signers: ["0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"]}}
        "400":
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              example: {type: "VALIDATION_ERROR", message: "Invalid request data."}
        "404":
          description: Wallet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              example: {type: "NOT_FOUND", message: "The requested resource was not found."}
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              example: {type: "INTERNAL_ERROR", message: "An internal error occurred."}

  /channels:
    post:
      tags:
        - Channels
      operationId: createChannel
      summary: Creates a new channel.
      requestBody:
        description: Channel creation parameters.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChannel"
            example: {name: "my-channel"}
      responses:
        "401":
          $ref: "#/components/responses/OrganizationNotFound"
        "201":
          description: Channel created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
              example: {channel_id: "7c9e6679-7425-40de-944b-e07fc1f90ae7", name: "my-channel", status: "active", created_at: 1715698800}
        "400":
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              example: {type: "VALIDATION_ERROR", message: "Invalid request data."}
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              example: {type: "INTERNAL_ERROR", message: "An internal error occurred."}
    get:
      tags:
        - Channels
      operationId: listChannels
      summary: Retrieves channels for the organization.
      description: |
        Returns channels for the organization. Archived channels are excluded by default.
        To include archived channels, explicitly specify the archived status in the status filter.
      parameters:
        - in: query
          name: name
          description: Filter channels by name (case-insensitive partial match)
          schema:
            type: string
        - in: query
          name: status
          description: Filter channels by status. Multiple values allowed. Archived channels are excluded by default when no status filter is specified.
          schema:
            type: array
            items:
              $ref: "#/components/schemas/ChannelStatus"
          style: form
          explode: true
        - in: query
          name: limit
          description: Maximum number of channels to return
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - in: query
          name: offset
          description: Number of channels to skip for pagination
          schema:
            type: integer
            format: int64
            minimum: 0
            default: 0
      responses:
        "401":
          $ref: "#/components/responses/OrganizationNotFound"
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelList"
              example: {data: [], has_more: false}
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              example: {type: "INTERNAL_ERROR", message: "An internal error occurred."}
  /channels/{channel_id}:
    get:
      tags:
        - Channels
      operationId: getChannel
      summary: Retrieves a specific channel by ID.
      parameters:
        - in: path
          name: channel_id
          required: true
          description: Unique channel identifier.
          schema:
            type: string
            format: uuid
      responses:
        "401":
          $ref: "#/components/responses/OrganizationNotFound"
        "200":
          description: Channel found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
              example: {channel_id: "7c9e6679-7425-40de-944b-e07fc1f90ae7", name: "my-channel", status: "active", created_at: 1715698800}
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              example: {type: "NOT_FOUND", message: "The requested resource was not found."}
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              example: {type: "INTERNAL_ERROR", message: "An internal error occurred."}
    patch:
      tags:
        - Channels
      operationId: updateChannel
      summary: Updates a channel.
      description: |
        Updates channel properties. Can be used to update the name, description, or to transition the channel status (e.g., to archived).
        A channel cannot be archived if it has active watchers.
      parameters:
        - in: path
          name: channel_id
          required: true
          description: Unique channel identifier.
          schema:
            type: string
            format: uuid
      requestBody:
        description: Channel update parameters.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchChannel"
            example: {name: "updated-channel"}
      responses:
        "401":
          $ref: "#/components/responses/OrganizationNotFound"
        "200":
          description: Channel updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
              example: {channel_id: "7c9e6679-7425-40de-944b-e07fc1f90ae7", name: "updated-channel", status: "active", created_at: 1715698800}
        "400":
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              example: {type: "VALIDATION_ERROR", message: "Invalid request data."}
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              example: {type: "NOT_FOUND", message: "The requested resource was not found."}
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              example: {type: "INTERNAL_ERROR", message: "An internal error occurred."}

  /channels/{channel_id}/queries:
    post:
      tags:
        - Queries
      operationId: createQuery
      summary: Creates a chain query under a channel.
      description: |
        Creates a channel-scoped Chain Query Request. New queries are rejected for archived channels.
        The customer-provided idempotency_key is scoped to the organization and channel.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuery"
            examples:
              latestEVMCall:
                summary: EVM call resolved at the latest block
                value:
                  idempotency_key: "balance-latest-001"
                  query_kind: "evm_call"
                  chain_selector: "16015286601757825753"
                  params:
                    contract_address: "0x1111111111111111111111111111111111111111"
                    call_data: "0x70a08231000000000000000000000000742d35Cc6634C0532925a3b844Bc454e4438f44e"
                    block_selection: {type: "latest"}
                    from_address: "0x742d35Cc6634C0532925a3b844Bc454e4438f44e"
                  metadata: {request_id: "balance-check-001"}
              finalizedEVMCall:
                summary: EVM call resolved at the finalized block
                value:
                  idempotency_key: "total-supply-finalized-001"
                  query_kind: "evm_call"
                  chain_selector: "16015286601757825753"
                  params:
                    contract_address: "0x1111111111111111111111111111111111111111"
                    call_data: "0x18160ddd"
                    block_selection: {type: "finalized"}
              explicitBlockEVMCall:
                summary: EVM call at an explicit block number
                value:
                  idempotency_key: "decimals-block-001"
                  query_kind: "evm_call"
                  chain_selector: "16015286601757825753"
                  params:
                    contract_address: "0x1111111111111111111111111111111111111111"
                    call_data: "0x313ce567"
                    block_selection:
                      type: "block_number"
                      block_number: "6500000"
      responses:
        "401":
          $ref: "#/components/responses/OrganizationNotFound"
        "202":
          description: Query accepted for execution.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryAcceptedResponse"
              example: {query_id: "5e4b3c2a-1f0e-4d9c-8b7a-6f5e4d3c2b1a", status: "accepted"}
        "400":
          description: Invalid request data, unsupported query kind, invalid params, invalid calldata, invalid block selection, or archived channel.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              example: {type: "VALIDATION_ERROR", message: "Invalid query request."}
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              example: {type: "NOT_FOUND", message: "The requested channel was not found."}
        "409":
          description: Idempotency key reused with a different canonical request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              example: {type: "CONFLICT", message: "Idempotency key reused with a different canonical request."}
        "429":
          description: Query create quota or workflow admission rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              example: {type: "VALIDATION_ERROR", message: "Query create quota or workflow admission rate limit exceeded."}
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              example: {type: "INTERNAL_ERROR", message: "An internal error occurred."}
    get:
      tags:
        - Queries
      operationId: listQueries
      summary: Lists chain queries for a channel.
      description: |
        Returns chain query records for the channel.
        Each item includes `target`, `event_hash`, `verifiable_result`, and `proof` when those fields are available.
        Filters compose with logical AND.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: limit
          description: Maximum number of queries to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: offset
          description: Number of queries to skip for pagination
          schema:
            type: integer
            format: int64
            minimum: 0
            default: 0
        - in: query
          name: status
          description: Filter queries by status. Multiple values allowed.
          schema:
            type: array
            items:
              $ref: "#/components/schemas/QueryStatus"
          style: form
          explode: true
          example: ["accepted", "completed"]
        - in: query
          name: query_kind
          description: Filter queries by kind. Multiple values allowed.
          schema:
            type: array
            items:
              $ref: "#/components/schemas/QueryKind"
          style: form
          explode: true
          example: ["evm_call"]
        - in: query
          name: chain_selector
          description: Filter queries by chain selector (network).
          schema:
            $ref: "#/components/schemas/ChainSelector"
      responses:
        "401":
          $ref: "#/components/responses/OrganizationNotFound"
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryList"
              examples:
                defaultList:
                  summary: Default list — limit=20, offset=0
                  description: |
                    `GET /channels/{channel_id}/queries?limit=20&offset=0`
                  value:
                    data:
                      - query_id: "5e4b3c2a-1f0e-4d9c-8b7a-6f5e4d3c2b1a"
                        channel_id: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
                        status: "completed"
                        query_kind: "evm_call"
                        chain_selector: "16015286601757825753"
                        target: "0x1111111111111111111111111111111111111111"
                        event_hash: "0xabc123def456"
                        verifiable_result: "eyJzZXJ2aWNlIjoiX2NyZWMiLCJuYW1lIjoiQ2hhaW5RdWVyeSJ9"
                        proof:
                          alg: "ocr2vrf"
                          ocr_report: "0xabc123"
                          ocr_context: "0xdef456"
                          signatures: ["0x789abc"]
                        created_at: 1715698800
                        updated_at: 1715698815
                        expires_at: 1715702400
                        accepted_at: 1715698800
                        sending_at: 1715698801
                        sent_at: 1715698802
                        completed_at: 1715698815
                      - query_id: "9b1a52d7-3c11-4e88-9e1e-7b9a4b2c3d10"
                        channel_id: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
                        status: "sent"
                        query_kind: "evm_call"
                        chain_selector: "16015286601757825753"
                        target: "0x2222222222222222222222222222222222222222"
                        created_at: 1715698700
                        updated_at: 1715698710
                        expires_at: 1715702300
                        accepted_at: 1715698700
                        sending_at: 1715698705
                        sent_at: 1715698710
                    has_more: false
                filterByStatusAndChain:
                  summary: Filter — status=completed, chain_selector=16015286601757825753
                  description: |
                    `GET /channels/{channel_id}/queries?status=completed&chain_selector=16015286601757825753`
                    Completed Sepolia queries for the channel.
                  value:
                    data:
                      - query_id: "9b1a52d7-3c11-4e88-9e1e-7b9a4b2c3d10"
                        channel_id: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
                        status: "completed"
                        query_kind: "evm_call"
                        chain_selector: "16015286601757825753"
                        target: "0x1111111111111111111111111111111111111111"
                        created_at: 1715698700
                        updated_at: 1715698712
                        completed_at: 1715698712
                      - query_id: "5e4b3c2a-1f0e-4d9c-8b7a-6f5e4d3c2b1a"
                        channel_id: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
                        status: "completed"
                        query_kind: "evm_call"
                        chain_selector: "16015286601757825753"
                        target: "0x2222222222222222222222222222222222222222"
                        created_at: 1715698800
                        updated_at: 1715698815
                        completed_at: 1715698815
                    has_more: false
                filterByKind:
                  summary: Filter by kind — query_kind=evm_call
                  description: |
                    `GET /channels/{channel_id}/queries?query_kind=evm_call`
                    EVM call queries for the channel.
                  value:
                    data:
                      - query_id: "5e4b3c2a-1f0e-4d9c-8b7a-6f5e4d3c2b1a"
                        channel_id: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
                        status: "completed"
                        query_kind: "evm_call"
                        chain_selector: "12922642891491394802"
                        target: "0x3333333333333333333333333333333333333333"
                        created_at: 1715698700
                        updated_at: 1715698715
                        completed_at: 1715698715
                      - query_id: "9b1a52d7-3c11-4e88-9e1e-7b9a4b2c3d10"
                        channel_id: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
                        status: "completed"
                        query_kind: "evm_call"
                        chain_selector: "16015286601757825753"
                        target: "0x1111111111111111111111111111111111111111"
                        created_at: 1715698800
                        updated_at: 1715698815
                        completed_at: 1715698815
                    has_more: false
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              example: {type: "NOT_FOUND", message: "The requested channel was not found."}
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
              example: {type: "INTERNAL_ERROR", message: "An internal error occurred."}
  /channels/{channel_id}/queries/{query_id}:
    get:
      tags:
        - Queries
      operationId: getQuery
      summary: Retrieves a specific chain query by ID.
      description: |
