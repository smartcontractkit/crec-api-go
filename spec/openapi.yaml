openapi: 3.0.4
info:
  title: Chainlink Verifiable Network Tenant API
  version: 0.1.0
  description: Tenant API for managing wallets, channels, watchers, and operations

paths:
  /health-check:
    get:
      summary: Health check endpoint
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthCheck"

  /wallets:
    post:
      summary: Creates a new wallet.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWallet"
      responses:
        "201":
          description: Wallet created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"
        "400":
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
    get:
      summary: Retrieves wallets for the organization.
      parameters:
        - in: query
          name: name
          description: Filter wallets by name (case-insensitive partial match)
          schema:
            type: string
        - in: query
          name: chain_selector
          description: Filter wallets by chain selector
          schema:
            type: string
        - in: query
          name: limit
          description: Maximum number of wallets to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - in: query
          name: offset
          description: Number of wallets to skip for pagination
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletList"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
  /wallets/{wallet_id}:
    get:
      summary: Retrieves a specific wallet by ID.
      parameters:
        - in: path
          name: wallet_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Wallet found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"
        "404":
          description: Wallet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
    patch:
      summary: Updates a wallet name.
      parameters:
        - in: path
          name: wallet_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWallet"
      responses:
        "200":
          description: Wallet updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"
        "400":
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "404":
          description: Wallet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"

  /channels:
    post:
      summary: Creates a new channel.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChannel"
      responses:
        "201":
          description: Channel created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
        "400":
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
    get:
      summary: Retrieves channels for the organization.
      parameters:
        - in: query
          name: name
          description: Filter channels by name (case-insensitive partial match)
          schema:
            type: string
        - in: query
          name: limit
          description: Maximum number of channels to return
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - in: query
          name: offset
          description: Number of channels to skip for pagination
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelList"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
  /channels/{channel_id}:
    get:
      summary: Retrieves a specific channel by ID.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Channel found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
    delete:
      summary: Deletes a channel.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "202":
          description: Delete request accepted.
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"

  /channels/{channel_id}/watchers:
    post:
      summary: Creates a watcher in a channel.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWatcher"
      responses:
        "201":
          description: Watcher created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Watcher"
        "400":
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
    get:
      summary: Retrieves watchers for a channel.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: limit
          description: Maximum number of watchers to return
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - in: query
          name: offset
          description: Number of watchers to skip for pagination
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: name
          description: Filter watchers by name (case-insensitive partial match)
          schema:
            type: string
        - in: query
          name: status
          description: Filter watchers by status
          schema:
            type: string
        - in: query
          name: chain_selector
          description: Filter watchers by chain selector
          schema:
            type: string
        - in: query
          name: address
          description: Filter watchers by contract address
          schema:
            type: string
        - in: query
          name: domain
          description: Filter watchers by domain
          schema:
            type: string
        - in: query
          name: event_name
          description: Filter watchers by event name
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatcherList"
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
  /channels/{channel_id}/watchers/{watcher_id}:
    get:
      summary: Retrieves a specific watcher by ID.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: watcher_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Watcher found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Watcher"
        "404":
          description: Channel or watcher not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
    delete:
      summary: Deletes a watcher.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: watcher_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "202":
          description: Delete request accepted.
        "404":
          description: Channel or watcher not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
    patch:
      summary: Updates a watcher name.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: watcher_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWatcher"
      responses:
        "200":
          description: Watcher updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Watcher"
        "400":
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "404":
          description: Channel or watcher not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"

  /channels/{channel_id}/operations:
    post:
      summary: Sends a CreateOperation request to a channel.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOperation"
      responses:
        "201":
          description: Operation created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationResponse"
        "400":
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
    get:
      summary: Retrieves operations for a channel.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: limit
          description: Maximum number of operations to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: offset
          description: Number of operations to skip for pagination
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: status
          description: Filter operations by status
          schema:
            type: string
        - in: query
          name: chain_selector
          description: Filter operations by chain selector
          schema:
            type: string
        - in: query
          name: address
          description: Filter operations by wallet address
          schema:
            type: string
        - in: query
          name: wallet_id
          description: Filter operations by wallet ID
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperationList"
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
  /channels/{channel_id}/operations/{operation_id}:
    get:
      summary: Gets Operation record for a specific operation.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: operation_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Operation found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
        "404":
          description: Channel or operation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"

  /channels/{channel_id}/events:
    get:
      summary: Retrieves events from a channel.
      parameters:
        - in: path
          name: channel_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: limit
          description: Maximum number of events to return
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - in: query
          name: offset
          description: Offset for message-oriented pagination
          schema:
            type: string
        - in: query
          name: type
          description: Filter events by type
          schema:
            type: string
            enum:
              - operation.status
              - watcher.status
              - watcher.event
        - in: query
          name: status
          description: Filter by operation or watcher status
          schema:
            type: string
        - in: query
          name: event_name
          description: Filter by event name (for watcher.event type)
          schema:
            type: string
        - in: query
          name: domain
          description: Filter by watcher domain (for watcher events)
          schema:
            type: string
      responses:
        "200":
          description: Events retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
        "400":
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationError"

security:
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Api-Key
      description: Public organisation API key.
  schemas:
    HealthCheck:
      type: object
      properties:
        status:
          type: string
          example: "ok"
      required:
        - status
    RSAWalletType:
      type: object
      description: RSA Wallet type and allowed signers
      properties:
        wallet_type:
          type: string
          description: RSA Type of the wallet
          enum:
            - "rsa"
        allowed_rsa_signers:
          type: array
          items:
            type: object
            properties:
              e:
                type: string
                description: RSA public exponent of allowed signer
                ## For the public exponent (e), the common and recommended values
                ## result in an exact size of 3 or 4 bytes in encoded form.
                ## Max 17 bytes. in rare or custom implementations, it could be a
                ## large number up to the size of the modulus itself, i.e., hundreds
                ## of bytes (e.g., 256 bytes for a 2048-bit key). However, this is
                ## avoided in modern practice because it makes public key operations
                ## (encryption/signature verification) much slower without improving
                ## security
                ## bytes*2 for hex representation.
                pattern: "^0x[a-fA-F0-9]{2,34}$"
              n:
                type: string
                description: RSA modulus of allowed signer
                ## 1024 bit keys are less secure. Only 2048 bit keys or 4096 bit RSA
                ## keys are supported. Modulus = (number_of_bits / 8) bytes =
                ## bytes*2 for hex representation.
                pattern: "^0x[a-fA-F0-9]{512,}$"
            required:
              - e
              - n
          description: Allowed RSA public signing keys for the wallet
          minItems: 0
          maxItems: 10
          uniqueItems: true
      required:
        - wallet_type
        - allowed_rsa_signers
    ECDSAWalletType:
      type: object
      description: ECDSA Wallet type and allowed signers
      properties:
        wallet_type:
          type: string
          description: ECDSA Type of the wallet
          enum:
            - "ecdsa"
        allowed_ecdsa_signers:
          type: array
          items:
            type: string
            description: ECDSA public key of allowed signer
            pattern: "^0x[a-fA-F0-9]{40}$"
          description: Allowed ECDSA public signing keys for the wallet
          minItems: 0
          maxItems: 10
          uniqueItems: true
      required:
        - wallet_type
        - allowed_ecdsa_signers
    WalletTypes:
      oneOf:
        - $ref: '#/components/schemas/RSAWalletType'
        - $ref: '#/components/schemas/ECDSAWalletType'
    CreateWalletBase:
      type: object
      properties:
        name:
          type: string
          description: Name of the wallet
        wallet_owner_address:
          type: string
          description: Wallet Contract Owner Address (42-character hex string starting with 0x)
          pattern: "^0x[a-fA-F0-9]{40}$"
        chain_selector:
          type: string
          description: The id that identifies the chain where the wallet exists
          x-go-type: "uint64"
      required:
        - name
        - wallet_owner_address
        - chain_selector
    CreateWallet:
      allOf:
        - $ref: '#/components/schemas/CreateWalletBase'
        - $ref: '#/components/schemas/WalletTypes'
    UpdateWallet:
      type: object
      properties:
        name:
          type: string
          description: New name for the wallet
          minLength: 1
          maxLength: 255
          pattern: '^(?!\s*$).+'
      required:
        - name
    UpdateWatcher:
      type: object
      properties:
        name:
          type: string
          description: New name for the watcher
          minLength: 1
          maxLength: 255
          pattern: '^(?!\s*$).+'
      required:
        - name
    Wallet:
      type: object
      properties:
        wallet_id:
          type: string
          format: uuid
          description: Unique identifier for the wallet
        name:
          type: string
          description: Name of the wallet
        address:
          type: string
          description: EVM wallet address
        chain_selector:
          type: string
          description: The chain selector to identify the chain where the wallet exists
          x-go-type: "uint64"
      required:
        - wallet_id
        - address
        - chain_selector
    WalletList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Wallet"
        has_more:
          type: boolean
          description: True if there are more wallets to fetch
      required:
        - data
        - has_more

    TransactionRequest:
      type: object
      properties:
        to:
          type: string
          description: Address receiving the transaction
        value:
          type: string
          description: Amount of native token value being sent in the transaction
        data:
          type: string
          description: Hex-encoded calldata for the transaction
      required:
        - to
        - value
        - data
    Transaction:
      type: object
      properties:
        to:
          type: string
          description: Address receiving the transaction
        value:
          type: string
          description: Amount of native token value being sent in the transaction
        data:
          type: string
          description: Hex-encoded calldata for the transaction
      required:
        - to
        - value
        - data
    ApplicationError:
      type: object
      properties:
        type:
          type: string
          description: Error type
          enum:
            - "Already exists"
            - "Internal error"
            - "Not found"
            - "Bad request"
        message:
          type: string
          description: Error message describing the issue
      required:
        - type
        - message
    CreateChannel:
      type: object
      properties:
        name:
          type: string
          description: Name of the channel
      required:
        - name
    Channel:
      type: object
      properties:
        channel_id:
          type: string
          format: uuid
          description: Unique identifier for the channel
        name:
          type: string
          description: Name of the channel
        created_at:
          type: integer
          format: int64
          description: Timestamp of when the channel was created
      required:
        - channel_id
        - name
        - created_at
    ChannelList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Channel"
        has_more:
          type: boolean
          description: True if there are more channels to fetch
      required:
        - data
        - has_more
    CreateWatcher:
      oneOf:
        - $ref: "#/components/schemas/CreateWatcherWithDomain"
        - $ref: "#/components/schemas/CreateWatcherWithABI"
    CreateWatcherWithDomain:
      type: object
      properties:
        name:
          type: string
          description: Name for the watcher to help identify it
        chain_selector:
          type: string
          description: The chain selector to identify the chain where the watcher will run
          x-go-type: "uint64"
        address:
          type: string
          description: Smart contract address to watch for events
        domain:
          type: string
          description: Service domain namespace (e.g., "dvp", "dta")
        events:
          type: array
          items:
            type: string
          description: List of event names to watch for within the domain
          minItems: 1
      required:
        - chain_selector
        - address
        - domain
        - events
    CreateWatcherWithABI:
      type: object
      properties:
        name:
          type: string
          description: Name for the watcher to help identify it
        chain_selector:
          type: string
          description: The chain selector to identify the chain where the watcher will run
          x-go-type: "uint64"
        address:
          type: string
          description: Smart contract address to watch for events
        events:
          type: array
          items:
            type: string
          description: List of event names to watch for
          minItems: 1
        abi:
          type: array
          items:
            $ref: "#/components/schemas/EventABI"
          description: ABI definitions for the events to watch
          minItems: 1
      required:
        - chain_selector
        - address
        - events
        - abi
    EventABI:
      type: object
      properties:
        anonymous:
          type: boolean
          description: Whether the event is anonymous
        inputs:
          type: array
          items:
            $ref: "#/components/schemas/EventABIInput"
          description: Event input parameters
        name:
          type: string
          description: Name of the event
        type:
          type: string
          enum: ["event"]
          description: Type must be 'event'
      required:
        - anonymous
        - inputs
        - name
        - type
    EventABIInput:
      type: object
      properties:
        indexed:
          type: boolean
          description: Whether the parameter is indexed
        internalType:
          type: string
          description: Internal Solidity type
        name:
          type: string
          description: Parameter name
        type:
          type: string
          description: Parameter type
      required:
        - indexed
        - internalType
        - name
        - type
    Watcher:
      type: object
      properties:
        watcher_id:
          type: string
          format: uuid
          description: Unique identifier for the watcher
        name:
          type: string
          description: Name of the watcher for identification
        channel_id:
          type: string
          format: uuid
          description: ID of the channel this watcher belongs to
        created_at:
          type: integer
          format: int64
          description: Timestamp of when the watcher was created
        status:
          type: string
          description: Current status of the watcher
        chain_selector:
          type: string
          description: The chain selector to identify the chain where the watcher will run
          x-go-type: "uint64"
        address:
          type: string
          description: Smart contract address being watched
        domain:
          type: string
          description: Service domain namespace (if using domain-based events)
        events:
          type: array
          items:
            type: string
          description: List of event names being watched
        abi:
          type: array
          items:
            $ref: "#/components/schemas/EventABI"
          description: ABI definitions for the events (if not using domain-based events)
      required:
        - watcher_id
        - channel_id
        - created_at
        - status
        - chain_selector
        - address
        - events
    WatcherList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Watcher"
        has_more:
          type: boolean
          description: True if there are more watchers to fetch
      required:
        - data
        - has_more
    CreateOperation:
      type: object
      properties:
        chain_selector:
          type: string
          description: The chain selector to identify the chain where the operation will be executed
          x-go-type: "uint64"
        address:
          type: string
          description: Wallet address performing the operation
        wallet_operation_id:
          type: string
          description: Unique wallet operation identifier
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/TransactionRequest"
          description: List of transactions to execute
          minItems: 1
        signature:
          type: string
          description: EIP-712 signature of the operation
      required:
        - chain_selector
        - address
        - wallet_operation_id
        - transactions
        - signature
    Operation:
      type: object
      properties:
        operation_id:
          type: string
          format: uuid
          description: Unique identifier for the operation
        status:
          type: string
          description: Current status of the operation
        chain_selector:
          type: string
          description: The chain selector to identify the chain where the operation is executed
          x-go-type: "uint64"
        address:
          type: string
          description: Wallet address performing the operation
        wallet_operation_id:
          type: string
          description: Unique wallet operation identifier
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/TransactionRequest"
          description: List of transactions to execute
        signature:
          type: string
          description: EIP-712 signature of the operation
        created_at:
          type: integer
          format: int64
          description: Timestamp of when the operation was created
      required:
        - operation_id
        - status
        - chain_selector
        - address
        - wallet_operation_id
        - transactions
        - signature
        - created_at
    OperationResponse:
      type: object
      properties:
        operation_id:
          type: string
          format: uuid
          description: Unique identifier for the operation
      required:
        - operation_id
    OperationList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Operation"
        has_more:
          type: boolean
          description: True if there are more operations to fetch
      required:
        - data
        - has_more
    Event:
      type: object
      properties:
        payload:
          oneOf:
            - $ref: "#/components/schemas/OperationStatusPayload"
            - $ref: "#/components/schemas/WatcherStatusPayload"
            - $ref: "#/components/schemas/WatcherEventPayload"
          discriminator:
            propertyName: type
        headers:
          $ref: "#/components/schemas/EventHeaders"
      required:
        - payload
        - headers
    EventHeaders:
      type: object
      properties:
        offset:
          type: string
          description: Unique offset for message ordering
        proofs:
          type: array
          items:
            oneOf:
              - $ref: "#/components/schemas/OCRProof"
              - type: object
                description: Generic proof object for future extensibility
                additionalProperties: true
      required:
        - offset
        - proofs
    OCRProof:
      type: object
      properties:
        alg:
          type: string
          description: Algorithm used for the proof
        ocr_report:
          type: string
          description: OCR report data
        ocr_context:
          type: string
          description: OCR context data
        signatures:
          type: array
          items:
            type: string
          description: Array of signatures
      required:
        - alg
        - ocr_report
        - ocr_context
        - signatures
    OperationStatusPayload:
      type: object
      properties:
        type:
          type: string
          enum: [operation.status]
        status:
          type: string
          enum: [pending, sent, confirmed, failed]
          description: Current status of the operation
        status_reason:
          type: string
          description: Reason for the status
        chain_selector:
          type: string
          description: The chain selector to identify the chain where the operation will be executed
          x-go-type: "uint64"
        address:
          type: string
          description: Wallet address
        wallet_operation_id:
          type: string
          description: Wallet operation identifier
        transaction:
          $ref: "#/components/schemas/EventTransaction"
      required:
        - type
        - status
        - status_reason
        - chain_selector
        - address
        - wallet_operation_id
    WatcherStatusPayload:
      type: object
      properties:
        type:
          type: string
          enum: [watcher.status]
        watcher_id:
          type: string
          description: Unique watcher identifier
        status:
          type: string
          enum: [pending, deploying, removed, failed, deleting, deleted]
          description: Current status of the watcher
        status_code:
          type: string
          description: Status code
        status_reason:
          type: string
          description: Reason for the status
        chain_selector:
          type: string
          description: The chain selector to identify the chain where the watcher will run
          x-go-type: "uint64"
      required:
        - type
        - watcher_id
        - status
        - status_code
        - status_reason
        - chain_selector
    WatcherEventPayload:
      type: object
      properties:
        type:
          type: string
          enum: [watcher.event]
        watcher_id:
          type: string
          description: Unique watcher identifier
        chain_selector:
          type: string
          description: The chain selector to identify the chain where the watcher will run
          x-go-type: "uint64"
        address:
          type: string
          description: Contract address that emitted the event
        transaction:
          $ref: "#/components/schemas/EventTransaction"
        event:
          $ref: "#/components/schemas/WatcherEvent"
      required:
        - type
        - watcher_id
        - chain_selector
        - address
        - transaction
        - event
    EventTransaction:
      type: object
      properties:
        timestamp:
          type: integer
          format: int64
          description: Transaction timestamp
        hash:
          type: string
          description: Transaction hash
      required:
        - timestamp
        - hash
    WatcherEvent:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          description: Event timestamp
        domain:
          type: string
          description: Domain associated with the event (optional)
        event_name:
          type: string
          description: Name of the event
        topic_hash:
          type: string
          description: Event topic hash
        log_index:
          type: integer
          description: Log index in the transaction
        data:
          type: object
          additionalProperties: true
          description: Event data - can be any structure
        metadata:
          type: object
          additionalProperties: true
          description: Event metadata - can be any structure
      required:
        - timestamp
        - event_name
        - topic_hash
        - log_index
        - data
